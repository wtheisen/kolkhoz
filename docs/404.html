<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <meta name="description" content="Fragment not recovered." />
    <link rel="icon" type="image/png" href="/assets/icons/icon-wheat.png" />
    <title>Kolkhoz — Fragment not recovered</title>
    <script>
      try {
        if (localStorage.getItem("kolkhoz-theme") === "light") {
          document.documentElement.dataset.theme = "light";
        }
      } catch (e) {}
    </script>
    <style>
      @font-face {
        font-family: "Handjet";
        src: url("/assets/Handjet.ttf") format("truetype");
        font-display: swap;
      }

      :root {
        --paper: #e3d3aa;
        --paper-strong: #f2dfb2;
        --paper-body: #392f1f;
        --paper-ink: #19140d;
        --muted: #b7a57d;
        --red: #9f2f1e;
        --red-deep: #6f1d17;
        --gold: #d4aa53;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        margin: 0;
        background: linear-gradient(135deg, #0d0c0a 0%, #191611 48%, #0d0c0a 100%);
        color: var(--paper);
        font-family: Georgia, "Times New Roman", serif;
        font-size: 19px;
        line-height: 1.6;
      }

      body::before {
        position: fixed;
        inset: 0;
        z-index: -1;
        pointer-events: none;
        content: "";
        opacity: 0.22;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
        background-size: 18px 18px;
      }

      .site-header {
        position: sticky;
        top: 0;
        z-index: 60;
        border-bottom: 1px solid rgba(159, 47, 30, 0.8);
        background: rgba(13, 12, 10, 0.92);
        -webkit-backdrop-filter: blur(8px);
        backdrop-filter: blur(8px);
      }

      .site-header-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        max-width: 1180px;
        margin: 0 auto;
        padding: 14px 24px 12px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
      }

      .brand-mark {
        width: 42px;
        height: 42px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
      }

      .brand-name {
        color: var(--paper-strong);
        font-family: "Handjet", Georgia, serif;
        font-size: 38px;
        font-weight: 800;
        line-height: 1;
        text-transform: uppercase;
      }

      .nav {
        display: flex;
        gap: 26px;
        color: var(--paper-strong);
        font-size: 17px;
      }

      .nav a {
        color: inherit;
        text-decoration-color: transparent;
        text-underline-offset: 6px;
      }

      .nav a:hover,
      .nav a:focus-visible {
        color: #fff3cf;
        text-decoration-color: var(--red);
      }

      img.pixel {
        image-rendering: pixelated;
      }

      .theme-toggle {
        display: grid;
        width: 38px;
        height: 38px;
        place-items: center;
        padding: 0;
        border: 1px solid rgba(212, 170, 83, 0.32);
        border-radius: 6px;
        background: rgba(20, 19, 16, 0.8);
        cursor: pointer;
      }

      .theme-toggle img {
        width: 26px;
        height: 26px;
        object-fit: contain;
      }

      html[data-theme="light"] .theme-toggle .tt-to-light {
        display: none;
      }

      html:not([data-theme="light"]) .theme-toggle .tt-to-dark {
        display: none;
      }

      main {
        display: grid;
        flex: 1;
        place-items: center;
        width: 100%;
        max-width: 720px;
        margin: 0 auto;
        padding: 48px 24px 72px;
      }

      .fragment {
        position: relative;
        width: 100%;
        padding: 44px 34px 22px;
        border: 1px solid rgba(72, 46, 22, 0.45);
        background:
          linear-gradient(rgba(236, 219, 177, 0.97), rgba(216, 194, 148, 0.97)),
          radial-gradient(circle at 20% 10%, rgba(255, 255, 255, 0.45), transparent 18rem);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.4);
        color: var(--paper-ink);
        transform: rotate(-1.2deg);
        clip-path: polygon(
          0.6% 3%, 4% 0.5%, 22% 1.8%, 41% 0%, 62% 2%, 83% 0.6%, 97% 2.4%, 99.6% 8%,
          99% 34%, 100% 62%, 99.2% 88%, 96% 99%, 74% 98%, 52% 100%, 30% 98.4%, 9% 99.4%,
          1.4% 96%, 0% 68%, 1% 38%
        );
      }

      .fragment blockquote {
        margin: 0 0 8px;
        color: rgba(57, 47, 31, 0.55);
        font-size: clamp(26px, 5vw, 38px);
        font-style: italic;
        letter-spacing: 0.14em;
        text-align: center;
      }

      .ru {
        position: relative;
        border-bottom: 1px dotted rgba(111, 29, 23, 0.5);
        cursor: help;
      }

      .ru::after {
        content: attr(data-tr);
        position: absolute;
        bottom: calc(100% + 9px);
        left: 50%;
        z-index: 12;
        width: max-content;
        max-width: 280px;
        padding: 7px 13px;
        border: 1px solid rgba(72, 46, 22, 0.5);
        background: linear-gradient(rgba(236, 219, 177, 0.98), rgba(216, 194, 148, 0.98));
        color: var(--paper-ink);
        font-size: 14px;
        font-style: italic;
        letter-spacing: normal;
        line-height: 1.4;
        box-shadow: 0 14px 30px rgba(0, 0, 0, 0.45);
        opacity: 0;
        pointer-events: none;
        transform: translateX(-50%) rotate(-1deg);
        transition: opacity 140ms ease;
      }

      .ru:hover::after,
      .ru:focus::after {
        opacity: 1;
      }

      .ru:focus {
        outline: none;
      }

      .fragment .ru::after {
        bottom: auto;
        top: calc(100% + 9px);
      }

      .fragment figcaption {
        margin-top: 26px;
        padding-top: 12px;
        border-top: 1px dashed rgba(72, 46, 22, 0.4);
        color: var(--red-deep);
        font-size: 13px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .fragment figcaption .path {
        text-transform: none;
        letter-spacing: 0.04em;
      }

      .stamp {
        position: absolute;
        top: 16px;
        right: 18px;
        padding: 3px 12px;
        border: 2px solid rgba(111, 29, 23, 0.55);
        border-radius: 3px;
        color: rgba(111, 29, 23, 0.6);
        font-family: "Handjet", Georgia, serif;
        font-size: 22px;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        transform: rotate(6deg);
      }

      .home-line {
        margin: 34px 0 0;
        color: var(--muted);
        font-size: 17px;
        text-align: center;
      }

      .home-line a {
        color: var(--paper-strong);
        text-decoration-color: var(--red);
        text-underline-offset: 5px;
      }

      /* ---------- Light theme ---------- */

      html[data-theme="light"] {
        --paper: #4a3d26;
        --paper-strong: #241b0e;
        --muted: #6d5c3e;
        --gold: #8a6a28;
      }

      html[data-theme="light"] body {
        background: linear-gradient(135deg, #f0e3bf 0%, #e7d6ac 48%, #f0e3bf 100%);
        color: var(--paper);
      }

      html[data-theme="light"] body::before {
        background-image:
          linear-gradient(rgba(57, 47, 31, 0.06) 1px, transparent 1px),
          linear-gradient(90deg, rgba(57, 47, 31, 0.05) 1px, transparent 1px);
      }

      html[data-theme="light"] .site-header {
        background: rgba(240, 227, 191, 0.92);
      }

      html[data-theme="light"] .theme-toggle {
        border-color: rgba(72, 46, 22, 0.28);
        background: rgba(255, 248, 226, 0.9);
      }

      html[data-theme="light"] .nav a:hover,
      html[data-theme="light"] .nav a:focus-visible {
        color: #6f1d17;
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="site-header-inner">
        <a class="brand" href="/" aria-label="Kolkhoz home">
          <img class="brand-mark" src="/assets/app-icon.png" alt="" width="42" height="42" />
          <span class="brand-name">Kolkhoz</span>
        </a>
        <nav class="nav" aria-label="Primary navigation">
          <a href="/">Home</a>
          <a href="/how-to-play.html">How to play</a>
          <a href="/rules.html">Rules</a>
          <a href="/about.html">About</a>
          <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Switch appearance">
            <img class="pixel tt-to-light" src="/assets/icons/icon-appearance-light.png" alt="" />
            <img class="pixel tt-to-dark" src="/assets/icons/icon-appearance-dark.png" alt="" />
          </button>
        </nav>
      </div>
    </header>

    <main>
      <div>
        <figure class="fragment">
          <span class="stamp" aria-hidden="true">Not recovered</span>
          <blockquote>
            <p><span class="ru" data-tr="[ text missing ]" tabindex="0">[&nbsp;текст утрачен&nbsp;]</span></p>
          </blockquote>
          <figcaption>
            The page you requested<span class="path" id="frag-path"></span> is not among the
            fragments recovered from Point 63. It may yet appear in a later inventory. The
            counts, as the reader knows, do not agree. —Eds.
          </figcaption>
        </figure>
        <p class="home-line">
          Return to <a href="/">the collective</a>, consult
          <a href="/how-to-play.html">the recovered rules</a>, or read
          <a href="/about.html">how the fragments were found</a>.
        </p>
      </div>
    </main>

    <script>
      (function () {
        var p = window.location.pathname;
        if (p && p !== "/404.html") {
          document.getElementById("frag-path").textContent = " — " + p + " —";
        }
      })();

      const themeToggle = document.getElementById("theme-toggle");
      if (themeToggle) {
        themeToggle.addEventListener("click", () => {
          const toLight = document.documentElement.dataset.theme !== "light";
          if (toLight) {
            document.documentElement.dataset.theme = "light";
          } else {
            delete document.documentElement.dataset.theme;
          }
          try {
            localStorage.setItem("kolkhoz-theme", toLight ? "light" : "dark");
          } catch (e) {}
        });
      }
    </script>
  </body>
</html>
