name: KolkhozSwiftUI
options:
  bundleIdPrefix: com.williamtheisen
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  KolkhozCEngine:
    type: framework
    platform: iOS
    sources:
      - Sources/KolkhozCEngine
    headers:
      public:
        - Sources/KolkhozCEngine/include/KolkhozCEngine.h
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.williamtheisen.kolkhoz.cengine
        GENERATE_INFOPLIST_FILE: YES
  KolkhozCore:
    type: framework
    platform: iOS
    sources:
      - Sources/KolkhozCore
    resources:
      - Sources/KolkhozCore/Resources
    dependencies:
      - target: KolkhozCEngine
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.williamtheisen.kolkhoz.core
        GENERATE_INFOPLIST_FILE: YES
  KolkhozAppFeature:
    type: framework
    platform: iOS
    sources:
      - Sources/KolkhozAppFeature
    resources:
      - Sources/KolkhozAppFeature/Resources
    dependencies:
      - target: KolkhozCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.williamtheisen.kolkhoz.appfeature
        GENERATE_INFOPLIST_FILE: YES
  KolkhozSwiftUIApp:
    type: application
    platform: iOS
    sources:
      - Sources/KolkhozSwiftUIApp
    resources:
      - Sources/KolkhozSwiftUIApp/Assets.xcassets
      - Sources/KolkhozSwiftUIApp/PrivacyInfo.xcprivacy
    dependencies:
      - target: KolkhozAppFeature
      - target: KolkhozCore
      - target: KolkhozCEngine
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: Kolkhoz
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.williamtheisen.kolkhoz
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
