name: KolkhozSwiftUI
options:
  bundleIdPrefix: com.kolkhoz
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  KolkhozCore:
    type: framework
    platform: iOS
    sources:
      - Sources/KolkhozCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kolkhoz.KolkhozCore
        GENERATE_INFOPLIST_FILE: YES
  KolkhozAppFeature:
    type: framework
    platform: iOS
    sources:
      - Sources/KolkhozAppFeature
    resources:
      - Sources/KolkhozAppFeature/Resources
    dependencies:
      - target: KolkhozCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kolkhoz.KolkhozAppFeature
        GENERATE_INFOPLIST_FILE: YES
  KolkhozSwiftUIApp:
    type: application
    platform: iOS
    sources:
      - Sources/KolkhozSwiftUIApp
    dependencies:
      - target: KolkhozAppFeature
      - target: KolkhozCore
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: Kolkhoz
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kolkhoz.KolkhozSwiftUI
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
