    <circle cx="381" cy="493" r="2"/><circle cx="1002" cy="382" r="2"/>
    <circle cx="1189" cy="719" r="2"/><circle cx="514" cy="913" r="2"/>
    <circle cx="907" cy="1128" r="2"/><circle cx="1252" cy="1371" r="2"/>
