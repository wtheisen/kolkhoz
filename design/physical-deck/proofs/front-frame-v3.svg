  <path d="M220 198H1424L1446 220V2024L1424 2046H220L198 2024V220Z" fill="#20251f"/>
  <rect x="210" y="210" width="1224" height="1824" fill="#a8462c"/>
  <rect x="220" y="220" width="1204" height="1804" fill="#59603e"/>
  <rect x="227" y="227" width="1190" height="1790" fill="#ead18d"/>

  <!-- Upper-right decoration: no containing box, and outside the upper-left index field. -->
  <g>
    <path d="M1417 227H1307L1417 337Z" fill="#4b5435"/>
    <path d="M1408 235L1326 235L1408 248Z" fill="#e3c17a"/>
    <path d="M1408 235L1342 258L1411 252Z" fill="#e3c17a"/>
    <path d="M1408 235L1362 286L1413 258Z" fill="#e3c17a"/>
    <path d="M1408 235L1390 314L1415 264Z" fill="#e3c17a"/>
  </g>

  <!-- Lower-left decoration: 180-degree partner; lower-right index field stays entirely clear. -->
  <g>
    <path d="M227 2017H337L227 1907Z" fill="#4b5435"/>
    <path d="M236 2009L318 2009L236 1996Z" fill="#e3c17a"/>
    <path d="M236 2009L302 1986L233 1992Z" fill="#e3c17a"/>
    <path d="M236 2009L282 1958L231 1986Z" fill="#e3c17a"/>
    <path d="M236 2009L254 1930L229 1980Z" fill="#e3c17a"/>
  </g>

  <!-- Sparse ink flecks, intentionally quiet behind future pips and portraits. -->
