<svg xmlns="http://www.w3.org/2000/svg" width="1644" height="2244" viewBox="0 0 1644 2244">
  <defs>
    <filter id="paper" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.42" numOctaves="2" seed="37" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="gray"/>
      <feComponentTransfer in="gray" result="faint">
        <feFuncA type="table" tableValues="0 0.055"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="faint" mode="multiply"/>
    </filter>
    <clipPath id="safeFrame">
      <path d="M190 150H1454L1494 190V2054L1454 2094H190L150 2054V190Z"/>
    </clipPath>
  </defs>

  <!-- 72 px around the 1500 x 2100 trim area is MPC bleed at 600 dpi. -->
  <rect width="1644" height="2244" fill="#e3c17a" filter="url(#paper)"/>

  <!-- All strong frame geometry remains inside MPC's 72 px post-trim safe margin. -->
  <path d="M190 150H1454L1494 190V2054L1454 2094H190L150 2054V190Z" fill="#20251f"/>
  <path d="M202 174H1442L1470 202V2042L1442 2070H202L174 2042V202Z" fill="#d8ba74"/>
