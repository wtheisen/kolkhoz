<svg xmlns="http://www.w3.org/2000/svg" width="2244" height="2244" viewBox="0 0 2244 2244">
  <defs>
    <!-- Canonical corner window: lower-left is always this exact path rotated 180 degrees. -->
    <path id="cornerWindowShape"
          d="M970 116 H1440 L1492 168 V752
             C1460 615 1370 492 1210 366
             C1145 315 1112 282 1107 224
             C1102 160 1055 116 970 116 Z"/>
    <clipPath id="upperRightWindow">
      <use href="#cornerWindowShape"/>
    </clipPath>
    <clipPath id="lowerLeftWindow">
      <use href="#cornerWindowShape" transform="rotate(180 822 1122)"/>
    </clipPath>

    <!-- One strong interior rail is mirrored exactly, never regenerated. -->
    <path id="cornerRail"
          d="M970 116
             C1055 116 1102 160 1107 224
             C1112 282 1145 315 1210 366
             C1370 492 1460 615 1492 752"/>

    <filter id="paperTooth" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.42" numOctaves="2" seed="31" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="gray"/>
      <feComponentTransfer in="gray" result="faint">
        <feFuncA type="linear" slope="0.04"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="faint" mode="multiply"/>
    </filter>

    <filter id="suitContrast" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feComponentTransfer in="SourceGraphic">
        <feFuncR type="linear" slope="0.84"/>
        <feFuncG type="linear" slope="0.78"/>
        <feFuncB type="linear" slope="0.66"/>
      </feComponentTransfer>
    </filter>
    <style>
      @font-face {
        font-family: 'Kolkhoz Zilla Slab';
        src: url('file:///Users/wtheisen/Library/CloudStorage/Dropbox/linux_files/programs/kolkhoz/design/physical-deck/fonts/candidates/zilla-slab/ZillaSlab-Bold.ttf');
        font-weight: 700;
      }
      .rank {
        font-family: 'Kolkhoz Zilla Slab';
        font-size: 300px;
        font-weight: 700;
        fill: #263025;
        text-anchor: middle;
      }
      .suit { filter: url(#suitContrast); }
    </style>
  </defs>

  <!-- Square wrapper prevents Quick Look from cropping the tall MPC canvas. -->
  <g transform="translate(300 0)">
    <rect width="1644" height="2244" fill="#f6edcf" filter="url(#paperTooth)"/>

    <!-- Suit art is independent of the frame and is visible only through fixed windows. -->
    <image href="file:///Users/wtheisen/Library/CloudStorage/Dropbox/linux_files/programs/kolkhoz/design/physical-deck/proofs/generated-borders/wheat-artwork-plate-v1-mpc.png"
           x="0" y="0" width="1644" height="2244" clip-path="url(#upperRightWindow)"/>
    <image href="file:///Users/wtheisen/Library/CloudStorage/Dropbox/linux_files/programs/kolkhoz/design/physical-deck/proofs/generated-borders/wheat-artwork-plate-v1-mpc.png"
           x="58" y="0" width="1644" height="2244" clip-path="url(#lowerLeftWindow)"/>

    <!-- Immutable vector frame shared by every rank and suit. -->
    <g fill="none" stroke="#33434a" stroke-linejoin="miter">
      <path d="M176 88 H1460 L1520 148 V2096 L1460 2156 H184 L124 2096 V148 Z"
            stroke-width="15"/>
      <path d="M204 116 H1440 L1492 168 V2076 L1440 2128 H204 L152 2076 V168 Z"
            stroke-width="9"/>

      <use href="#cornerRail" stroke-width="9"/>
      <use href="#cornerRail" stroke-width="9" transform="rotate(180 822 1122)"/>
    </g>

    <text class="rank" x="340" y="430">7</text>
    <image class="suit" href="file:///Users/wtheisen/Library/CloudStorage/Dropbox/linux_files/programs/kolkhoz/app/assets/art/field_plan/cards/suits/suit-wheat.png"
           x="265" y="510" width="150" height="150"/>

    <image class="suit" href="file:///Users/wtheisen/Library/CloudStorage/Dropbox/linux_files/programs/kolkhoz/app/assets/art/field_plan/cards/suits/suit-wheat.png"
           x="470" y="365" width="340" height="340"/>
    <image class="suit" href="file:///Users/wtheisen/Library/CloudStorage/Dropbox/linux_files/programs/kolkhoz/app/assets/art/field_plan/cards/suits/suit-wheat.png"
           x="834" y="365" width="340" height="340"/>
    <image class="suit" href="file:///Users/wtheisen/Library/CloudStorage/Dropbox/linux_files/programs/kolkhoz/app/assets/art/field_plan/cards/suits/suit-wheat.png"
           x="652" y="760" width="340" height="340"/>
    <image class="suit" href="file:///Users/wtheisen/Library/CloudStorage/Dropbox/linux_files/programs/kolkhoz/app/assets/art/field_plan/cards/suits/suit-wheat.png"
           x="470" y="1055" width="340" height="340"/>
    <image class="suit" href="file:///Users/wtheisen/Library/CloudStorage/Dropbox/linux_files/programs/kolkhoz/app/assets/art/field_plan/cards/suits/suit-wheat.png"
           x="834" y="1055" width="340" height="340"/>
    <image class="suit" href="file:///Users/wtheisen/Library/CloudStorage/Dropbox/linux_files/programs/kolkhoz/app/assets/art/field_plan/cards/suits/suit-wheat.png"
           x="470" y="1485" width="340" height="340" transform="rotate(180 640 1655)"/>
    <image class="suit" href="file:///Users/wtheisen/Library/CloudStorage/Dropbox/linux_files/programs/kolkhoz/app/assets/art/field_plan/cards/suits/suit-wheat.png"
           x="834" y="1485" width="340" height="340" transform="rotate(180 1004 1655)"/>

    <g transform="rotate(180 822 1122)">
      <text class="rank" x="340" y="430">7</text>
      <image class="suit" href="file:///Users/wtheisen/Library/CloudStorage/Dropbox/linux_files/programs/kolkhoz/app/assets/art/field_plan/cards/suits/suit-wheat.png"
             x="265" y="510" width="150" height="150"/>
    </g>
  </g>
</svg>
