<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="2400" viewBox="0 0 2400 2400">
  <defs>
    <filter id="suitContrast" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feComponentTransfer in="SourceGraphic">
        <feFuncR type="linear" slope="0.84"/>
        <feFuncG type="linear" slope="0.78"/>
        <feFuncB type="linear" slope="0.66"/>
      </feComponentTransfer>
    </filter>
    <filter id="cardShadow" x="-15%" y="-10%" width="130%" height="125%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#11150f" flood-opacity="0.22"/>
    </filter>
    <style>
      @font-face {
        font-family: 'Kolkhoz Zilla Slab';
        src: url('file:///Users/wtheisen/Library/CloudStorage/Dropbox/linux_files/programs/kolkhoz/design/physical-deck/fonts/candidates/zilla-slab/ZillaSlab-Bold.ttf');
        font-weight: 700;
      }
      .rank {
        font-family: 'Kolkhoz Zilla Slab';
        font-size: 300px;
        font-weight: 700;
        fill: #263025;
        text-anchor: middle;
      }
      .suit { filter: url(#suitContrast); }
      .choice {
        font-family: 'Kolkhoz Zilla Slab';
        font-size: 58px;
        font-weight: 700;
        fill: #263025;
        letter-spacing: 3px;
        text-anchor: middle;
      }
      .note {
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 28px;
        fill: #61665d;
        text-anchor: middle;
      }
    </style>

    <g id="cardContent">
      <text class="rank" x="380" y="500">7</text>
      <image class="suit" href="file:///Users/wtheisen/Library/CloudStorage/Dropbox/linux_files/programs/kolkhoz/app/assets/art/field_plan/cards/suits/suit-wheat.png"
             x="305" y="565" width="150" height="150"/>

      <image class="suit" href="file:///Users/wtheisen/Library/CloudStorage/Dropbox/linux_files/programs/kolkhoz/app/assets/art/field_plan/cards/suits/suit-wheat.png"
             x="470" y="400" width="340" height="340"/>
      <image class="suit" href="file:///Users/wtheisen/Library/CloudStorage/Dropbox/linux_files/programs/kolkhoz/app/assets/art/field_plan/cards/suits/suit-wheat.png"
             x="834" y="400" width="340" height="340"/>
      <image class="suit" href="file:///Users/wtheisen/Library/CloudStorage/Dropbox/linux_files/programs/kolkhoz/app/assets/art/field_plan/cards/suits/suit-wheat.png"
             x="652" y="680" width="340" height="340"/>
      <image class="suit" href="file:///Users/wtheisen/Library/CloudStorage/Dropbox/linux_files/programs/kolkhoz/app/assets/art/field_plan/cards/suits/suit-wheat.png"
             x="470" y="960" width="340" height="340"/>
      <image class="suit" href="file:///Users/wtheisen/Library/CloudStorage/Dropbox/linux_files/programs/kolkhoz/app/assets/art/field_plan/cards/suits/suit-wheat.png"
             x="834" y="960" width="340" height="340"/>
      <image class="suit" href="file:///Users/wtheisen/Library/CloudStorage/Dropbox/linux_files/programs/kolkhoz/app/assets/art/field_plan/cards/suits/suit-wheat.png"
             x="470" y="1420" width="340" height="340" transform="rotate(180 640 1590)"/>
      <image class="suit" href="file:///Users/wtheisen/Library/CloudStorage/Dropbox/linux_files/programs/kolkhoz/app/assets/art/field_plan/cards/suits/suit-wheat.png"
             x="834" y="1420" width="340" height="340" transform="rotate(180 1004 1590)"/>

      <g transform="rotate(180 822 1122)">
        <text class="rank" x="380" y="500">7</text>
        <image class="suit" href="file:///Users/wtheisen/Library/CloudStorage/Dropbox/linux_files/programs/kolkhoz/app/assets/art/field_plan/cards/suits/suit-wheat.png"
               x="305" y="565" width="150" height="150"/>
      </g>
    </g>
  </defs>

  <!-- Square wrapper prevents Quick Look from scaling and clipping this wide proof. -->
  <rect width="2400" height="2400" fill="#d9d7cf"/>

  <!-- A: no perimeter treatment or decorative corners. -->
  <g transform="translate(95 78) scale(0.625)" filter="url(#cardShadow)">
    <rect width="1644" height="2244" fill="#ead18d"/>
    <use href="#cardContent"/>
  </g>

  <!-- B: identical card with generated, suit-specific art only in the unused corners. -->
  <g transform="translate(1278 78) scale(0.625)" filter="url(#cardShadow)">
    <image href="file:///Users/wtheisen/Library/CloudStorage/Dropbox/linux_files/programs/kolkhoz/design/physical-deck/proofs/generated-borders/wheat-corner-background-v2.png"
           x="0" y="0" width="1644" height="2244"/>
    <use href="#cardContent"/>
  </g>

  <text class="choice" x="609" y="1580">1  BORDERLESS</text>
  <text class="note" x="609" y="1632">cream stock, type, and pips only</text>

  <text class="choice" x="1792" y="1580">2  WHEAT CORNERS</text>
  <text class="note" x="1792" y="1632">generated field + harvest vignettes</text>
</svg>
