global
  log stdout format raw local0
  maxconn 12000

defaults
  log global
  mode http
  option httplog
  option http-server-close
  option forwardfor
  timeout connect 3s
  timeout client 40s
  timeout server 40s
  timeout tunnel 10m

frontend benchmark
  bind :8080
  default_backend gateways

backend gateways
  balance leastconn
  option httpchk GET /ready
  http-check expect status 200
  server gateway-a gateway-a:8787 check inter 2s fall 3 rise 2
  server gateway-b gateway-b:8787 check inter 2s fall 3 rise 2
  server gateway-c gateway-c:8787 check inter 2s fall 3 rise 2
  server gateway-d gateway-d:8787 check inter 2s fall 3 rise 2
