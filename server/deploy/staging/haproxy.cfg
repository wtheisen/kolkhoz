global
  log stdout format raw local0
  maxconn 4096

defaults
  log global
  mode http
  option httplog
  option http-server-close
  option forwardfor
  timeout connect 3s
  timeout client 35s
  timeout server 35s
  timeout tunnel 1h

frontend kolkhoz
  bind :8080
  default_backend gateways

backend gateways
  balance roundrobin
  option httpchk GET /health
  http-check expect status 200
  server gateway-a gateway-a:8787 check inter 2s fall 3 rise 2
  server gateway-b gateway-b:8787 check inter 2s fall 3 rise 2
