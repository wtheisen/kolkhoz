name: Publish Windows release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "New release tag, for example v1.0.0-windows.1"
        required: true
        type: string
      release_title:
        description: "Name shown on the GitHub release"
        required: true
        default: "Kolkhoz for Windows"
        type: string
      prerelease:
        description: "Mark this as a prerelease"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: windows-release
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      KOLKHOZ_SUPABASE_URL: ${{ secrets.KOLKHOZ_SUPABASE_URL }}
      KOLKHOZ_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.KOLKHOZ_SUPABASE_PUBLISHABLE_KEY }}
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Validate release tag
        shell: pwsh
        working-directory: ${{ github.workspace }}
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if ($env:RELEASE_TAG -notmatch '^[A-Za-z0-9][A-Za-z0-9._-]*$') {
            throw "Release tag may contain only letters, numbers, dots, underscores, and hyphens"
          }
          $existingTags = gh api "repos/$env:GITHUB_REPOSITORY/releases" --paginate --jq '.[].tag_name'
          if ($existingTags -contains $env:RELEASE_TAG) {
            throw "Release $env:RELEASE_TAG already exists; choose a new tag"
          }

      - run: dart run tool/sync_policy_assets.dart
      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      - run: flutter analyze

      - name: Build configured Windows release
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:KOLKHOZ_SUPABASE_URL)) {
            throw "Missing KOLKHOZ_SUPABASE_URL"
          }
          if ([string]::IsNullOrWhiteSpace($env:KOLKHOZ_SUPABASE_PUBLISHABLE_KEY)) {
            throw "Missing KOLKHOZ_SUPABASE_PUBLISHABLE_KEY"
          }
          flutter build windows --release `
            "--dart-define=KOLKHOZ_SUPABASE_URL=$env:KOLKHOZ_SUPABASE_URL" `
            "--dart-define=KOLKHOZ_SUPABASE_PUBLISHABLE_KEY=$env:KOLKHOZ_SUPABASE_PUBLISHABLE_KEY"

      - name: Test Windows release
        env:
          KOLKHOZ_C_ENGINE_LIB: ${{ github.workspace }}\app\build\windows\x64\runner\Release\kolkhoz_c_engine.dll
        run: >-
          flutter test
          test/commerce_test.dart
          test/parity_gate_test.dart
          test/progression_test.dart
          test/online_action_retry_test.dart

      - name: Verify and package release bundle
        shell: pwsh
        run: |
          $bundle = Resolve-Path "build/windows/x64/runner/Release"
          if (-not (Test-Path "$bundle/kolkhoz_app.exe")) { throw "Missing Windows executable" }
          if (-not (Test-Path "$bundle/kolkhoz_c_engine.dll")) { throw "Missing C engine DLL" }
          if (-not (Test-Path "$bundle/data/flutter_assets/assets/policies/hard_policy.json")) {
            throw "Missing policy assets"
          }

          $appAot = [System.Text.Encoding]::UTF8.GetString(
            [System.IO.File]::ReadAllBytes("$bundle/data/app.so")
          )
          if (-not $appAot.Contains($env:KOLKHOZ_SUPABASE_URL)) {
            throw "Supabase URL was not compiled into the Windows release"
          }

          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsInstall = & $vswhere -latest -products * -property installationPath
          if ([string]::IsNullOrWhiteSpace($vsInstall)) { throw "Visual Studio installation not found" }
          $crtDir = Get-ChildItem "$vsInstall\VC\Redist\MSVC" -Directory |
            Sort-Object Name -Descending |
            ForEach-Object { Join-Path $_.FullName "x64\Microsoft.VC143.CRT" } |
            Where-Object { Test-Path $_ } |
            Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($crtDir)) { throw "Visual C++ runtime not found" }
          foreach ($dll in @("msvcp140.dll", "vcruntime140.dll", "vcruntime140_1.dll")) {
            if (-not (Test-Path "$crtDir\$dll")) { throw "Missing Visual C++ runtime file $dll" }
            Copy-Item "$crtDir\$dll" $bundle -Force
          }

          @(
            "Kolkhoz Windows Release"
            "Commit: $env:GITHUB_SHA"
            "Workflow run: $env:GITHUB_RUN_ID"
            "Built UTC: $([DateTime]::UtcNow.ToString('yyyy-MM-ddTHH:mm:ssZ'))"
            "Architecture: x64"
            "Cloud profiles: configured"
          ) | Set-Content "$bundle/BUILD_INFO.txt"

          $bundleChecksums = Get-ChildItem $bundle -File -Recurse |
            Where-Object { $_.Name -ne "SHA256SUMS.txt" } |
            Sort-Object FullName |
            ForEach-Object {
              $relative = $_.FullName.Substring($bundle.Path.Length + 1).Replace('\', '/')
              "$(Get-FileHash $_.FullName -Algorithm SHA256 | Select-Object -ExpandProperty Hash)  $relative"
            }
          [System.IO.File]::WriteAllText(
            "$bundle/SHA256SUMS.txt",
            ($bundleChecksums -join "`n") + "`n",
            [System.Text.UTF8Encoding]::new($false)
          )

          $package = "build/windows/package"
          New-Item -ItemType Directory -Path $package -Force | Out-Null
          $zip = "$package/kolkhoz-windows-x64.zip"
          Compress-Archive -Path "$bundle/*" -DestinationPath $zip -CompressionLevel Optimal
          $zipHash = Get-FileHash $zip -Algorithm SHA256
          [System.IO.File]::WriteAllText(
            "$package/kolkhoz-windows-x64.zip.sha256",
            "$($zipHash.Hash)  kolkhoz-windows-x64.zip`n",
            [System.Text.UTF8Encoding]::new($false)
          )

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: kolkhoz-windows-${{ inputs.release_tag }}
          path: |
            app/build/windows/package/kolkhoz-windows-x64.zip
            app/build/windows/package/kolkhoz-windows-x64.zip.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub release
        shell: pwsh
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_TITLE: ${{ inputs.release_title }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          $arguments = @(
            "release", "create", $env:RELEASE_TAG,
            "app/build/windows/package/kolkhoz-windows-x64.zip",
            "app/build/windows/package/kolkhoz-windows-x64.zip.sha256",
            "--repo", $env:GITHUB_REPOSITORY,
            "--target", $env:GITHUB_SHA,
            "--title", $env:RELEASE_TITLE,
            "--notes", "Windows x64 test build. Download the ZIP, extract the entire folder, and run kolkhoz_app.exe."
          )
          if ($env:PRERELEASE -eq "true") { $arguments += "--prerelease" }
          gh @arguments
