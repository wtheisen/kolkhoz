name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  engine-and-server:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/deploy/requirements.lock
      - name: Install server test dependencies
        run: python3 -m pip install --require-hashes -r server/deploy/requirements.lock && python3 -m pip install pytest ruff
      - name: Lint greenfield server
        run: ruff format --check server && ruff check server
      - name: Check C engine
        run: >-
          clang -std=c11 -I engine/KolkhozCEngine/include -fsyntax-only
          engine/KolkhozCEngine/KolkhozCEngine.c
      - name: Test greenfield server with unittest
        run: python3 -m unittest discover -s server/tests -q
      - name: Test greenfield server with pytest
        run: python3 -m pytest -q server/tests
      - name: Verify production policy assets with the real C engine
        run: python3 -m server.kolkhoz_server.preflight --repo-root "$GITHUB_WORKSPACE"
      - name: Test online progression and smoke tooling
        run: >-
          python3 -m unittest
          research.tests.test_progression
          research.tests.test_online_smoke
          research.tests.test_dashboard_smoke

  distributed-server-smoke:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Validate rerunnable PostgreSQL schemas
        run: ./server/tools/postgres_smoke.sh | tee postgres-smoke.log

      - name: Build and start distributed staging stack
        working-directory: server/deploy/staging
        run: docker compose up --build -d --wait --wait-timeout 300

      - name: Exercise both gateway replicas
        working-directory: server/deploy/staging
        run: python3 smoke.py | tee ../../../distributed-smoke.log

      - name: Capture distributed stack logs
        if: always()
        working-directory: server/deploy/staging
        run: docker compose logs --no-color > ../../../distributed-compose.log 2>&1 || true

      - name: Upload distributed smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: distributed-server-smoke-${{ github.run_attempt }}
          path: |
            postgres-smoke.log
            distributed-smoke.log
            distributed-compose.log
          if-no-files-found: warn
          retention-days: 14

      - name: Tear down distributed staging stack
        if: always()
        working-directory: server/deploy/staging
        run: |
          docker rm -f kolkhoz-staging-chaos-takeover >/dev/null 2>&1 || true
          docker compose down -v --remove-orphans --timeout 30

  flutter:
    runs-on: macos-15
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: dart run tool/sync_policy_assets.dart
      - run: ./tool/build_c_engine_macos.sh
      - run: flutter pub get
      - run: flutter analyze
      - name: Test portable Flutter suites
        run: >-
          flutter test
          --exclude-tags neural-policy
          test/parity_gate_test.dart
          test/widget_test.dart
          test/progression_test.dart
          test/online_action_retry_test.dart
      - name: Test bundled neural policy in isolation
        run: >-
          flutter test
          --concurrency=1
          --tags neural-policy
          test/widget_test.dart
      - name: Configure macOS debug build
        run: flutter build macos --debug --config-only
      - name: Build unsigned macOS debug app
        run: >-
          xcodebuild
          -workspace macos/Runner.xcworkspace
          -scheme Runner
          -configuration Debug
          -destination 'platform=macOS'
          CODE_SIGNING_ALLOWED=NO
          build
