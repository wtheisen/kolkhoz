name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  engine-and-server:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/deploy/requirements.txt
      - name: Install server test dependencies
        run: python3 -m pip install -r server/deploy/requirements.txt pytest ruff
      - name: Lint greenfield server
        run: ruff format --check server && ruff check server
      - name: Check C engine
        run: >-
          clang -std=c11 -I engine/KolkhozCEngine/include -fsyntax-only
          engine/KolkhozCEngine/KolkhozCEngine.c
      - name: Test greenfield server with unittest
        run: python3 -m unittest discover -s server/tests -q
      - name: Test greenfield server with pytest
        run: python3 -m pytest -q server/tests
      - name: Verify production policy assets with the real C engine
        run: python3 -m server.kolkhoz_server.preflight --repo-root "$GITHUB_WORKSPACE"
      - name: Test online progression and smoke tooling
        run: >-
          python3 -m unittest
          research.tests.test_progression
          research.tests.test_online_smoke
          research.tests.test_dashboard_smoke

  distributed-server-smoke:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Validate rerunnable PostgreSQL schemas
        run: ./server/tools/postgres_smoke.sh | tee postgres-smoke.log

      - name: Build and start distributed staging stack
        working-directory: server/deploy/staging
        run: docker compose up --build -d --wait --wait-timeout 300

      - name: Exercise both gateway replicas
        working-directory: server/deploy/staging
        run: python3 smoke.py | tee ../../../distributed-smoke.log

      - name: Capture distributed stack logs
        if: always()
        working-directory: server/deploy/staging
        run: docker compose logs --no-color > ../../../distributed-compose.log 2>&1 || true

      - name: Upload distributed smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: distributed-server-smoke-${{ github.run_attempt }}
          path: |
            postgres-smoke.log
            distributed-smoke.log
            distributed-compose.log
          if-no-files-found: warn
          retention-days: 14

      - name: Tear down distributed staging stack
        if: always()
        working-directory: server/deploy/staging
        run: |
          docker rm -f kolkhoz-staging-chaos-takeover >/dev/null 2>&1 || true
          docker compose down -v --remove-orphans --timeout 30

  flutter:
    runs-on: macos-15
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: dart run tool/sync_policy_assets.dart
      - run: ./tool/build_c_engine_macos.sh
      - run: flutter pub get
      - run: flutter analyze
      - name: Test portable Flutter suites
        run: >-
          flutter test
          test/parity_gate_test.dart
          test/widget_test.dart
          test/progression_test.dart
          test/online_action_retry_test.dart
      - run: flutter build macos --debug

  windows-release:
    if: github.event_name == 'push'
    runs-on: windows-latest
    env:
      KOLKHOZ_SUPABASE_URL: ${{ secrets.KOLKHOZ_SUPABASE_URL }}
      KOLKHOZ_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.KOLKHOZ_SUPABASE_PUBLISHABLE_KEY }}
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: dart run tool/sync_policy_assets.dart
      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      - run: flutter analyze
      - name: Build configured Windows release
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:KOLKHOZ_SUPABASE_URL)) { throw "Missing KOLKHOZ_SUPABASE_URL" }
          if ([string]::IsNullOrWhiteSpace($env:KOLKHOZ_SUPABASE_PUBLISHABLE_KEY)) { throw "Missing KOLKHOZ_SUPABASE_PUBLISHABLE_KEY" }
          flutter build windows --release `
            "--dart-define=KOLKHOZ_SUPABASE_URL=$env:KOLKHOZ_SUPABASE_URL" `
            "--dart-define=KOLKHOZ_SUPABASE_PUBLISHABLE_KEY=$env:KOLKHOZ_SUPABASE_PUBLISHABLE_KEY"
      - run: >-
          flutter test
          test/parity_gate_test.dart
          test/progression_test.dart
          test/online_action_retry_test.dart
        env:
          KOLKHOZ_C_ENGINE_LIB: ${{ github.workspace }}\app\build\windows\x64\runner\Release\kolkhoz_c_engine.dll
      - name: Verify release bundle
        shell: pwsh
        run: |
          $bundle = "build/windows/x64/runner/Release"
          if (-not (Test-Path "$bundle/kolkhoz_app.exe")) { throw "Missing Windows executable" }
          if (-not (Test-Path "$bundle/kolkhoz_c_engine.dll")) { throw "Missing C engine DLL" }
          if (-not (Test-Path "$bundle/data/flutter_assets/assets/policies/hard_policy.json")) { throw "Missing policy assets" }
          $appAot = [System.Text.Encoding]::UTF8.GetString([System.IO.File]::ReadAllBytes("$bundle/data/app.so"))
          if (-not $appAot.Contains($env:KOLKHOZ_SUPABASE_URL)) { throw "Supabase URL was not compiled into the Windows release" }
      - name: Add build manifest and checksums
        shell: pwsh
        run: |
          $bundle = Resolve-Path "build/windows/x64/runner/Release"
          @(
            "Kolkhoz Windows Release"
            "Commit: $env:GITHUB_SHA"
            "Workflow run: $env:GITHUB_RUN_ID"
            "Built UTC: $([DateTime]::UtcNow.ToString('yyyy-MM-ddTHH:mm:ssZ'))"
            "Cloud profiles: configured"
          ) | Set-Content "$bundle/BUILD_INFO.txt"
          Get-ChildItem $bundle -File -Recurse |
            Where-Object { $_.Name -ne "SHA256SUMS.txt" } |
            Sort-Object FullName |
            ForEach-Object {
              $relative = $_.FullName.Substring($bundle.Path.Length + 1).Replace('\', '/')
              "$(Get-FileHash $_.FullName -Algorithm SHA256 | Select-Object -ExpandProperty Hash)  $relative"
            } | Set-Content "$bundle/SHA256SUMS.txt"
      - name: Upload Windows release
        uses: actions/upload-artifact@v4
        with:
          name: kolkhoz-windows-${{ github.sha }}
          path: app/build/windows/x64/runner/Release/
          if-no-files-found: error
          retention-days: 30

  macos-release:
    if: github.event_name == 'push'
    runs-on: macos-15
    env:
      KOLKHOZ_SUPABASE_URL: ${{ secrets.KOLKHOZ_SUPABASE_URL }}
      KOLKHOZ_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.KOLKHOZ_SUPABASE_PUBLISHABLE_KEY }}
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: dart run tool/sync_policy_assets.dart
      - run: ./tool/build_c_engine_macos.sh
      - run: flutter pub get
      - name: Build configured macOS release
        run: |
          test -n "$KOLKHOZ_SUPABASE_URL" || { echo "Missing KOLKHOZ_SUPABASE_URL" >&2; exit 1; }
          test -n "$KOLKHOZ_SUPABASE_PUBLISHABLE_KEY" || { echo "Missing KOLKHOZ_SUPABASE_PUBLISHABLE_KEY" >&2; exit 1; }
          flutter build macos --release \
            --dart-define="KOLKHOZ_SUPABASE_URL=$KOLKHOZ_SUPABASE_URL" \
            --dart-define="KOLKHOZ_SUPABASE_PUBLISHABLE_KEY=$KOLKHOZ_SUPABASE_PUBLISHABLE_KEY"
      - name: Verify release bundle
        run: |
          bundle="build/macos/Build/Products/Release/kolkhoz_app.app"
          test -x "$bundle/Contents/MacOS/kolkhoz_app"
          test -f "$bundle/Contents/Frameworks/libkolkhoz_c_engine.dylib"
          test -n "$(find "$bundle" -path '*/flutter_assets/assets/policies/hard_policy.json' -print -quit)"
          otool -L "$bundle/Contents/MacOS/kolkhoz_app"
          otool -L "$bundle/Contents/Frameworks/libkolkhoz_c_engine.dylib"
          xcrun lipo "$bundle/Contents/MacOS/kolkhoz_app" -verify_arch arm64 x86_64
          xcrun lipo "$bundle/Contents/Frameworks/App.framework/Versions/A/App" -verify_arch arm64 x86_64
          xcrun lipo "$bundle/Contents/Frameworks/libkolkhoz_c_engine.dylib" -verify_arch arm64 x86_64
          grep -aFq "$KOLKHOZ_SUPABASE_URL" "$bundle/Contents/Frameworks/App.framework/Versions/A/App" || {
            echo "Supabase URL was not compiled into the macOS release" >&2
            exit 1
          }
          codesign --force --deep --sign - "$bundle"
          codesign --verify --deep --strict --verbose=2 "$bundle"
      - name: Package macOS release
        run: |
          bundle="build/macos/Build/Products/Release/kolkhoz_app.app"
          package="build/macos/package"
          rm -rf "$package"
          mkdir -p "$package"
          {
            echo "Kolkhoz macOS Release"
            echo "Commit: $GITHUB_SHA"
            echo "Workflow run: $GITHUB_RUN_ID"
            echo "Built UTC: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "Signing: ad-hoc"
            echo "Cloud profiles: configured"
          } > "$package/BUILD_INFO.txt"
          (
            cd "$(dirname "$bundle")"
            find "$(basename "$bundle")" -type f -print0 |
              sort -z |
              xargs -0 shasum -a 256
          ) > "$package/SHA256SUMS.txt"
          ditto -c -k --sequesterRsrc --keepParent "$bundle" "$package/kolkhoz-macos.zip"
      - name: Upload macOS release
        uses: actions/upload-artifact@v4
        with:
          name: kolkhoz-macos-${{ github.sha }}
          path: |
            app/build/macos/package/kolkhoz-macos.zip
            app/build/macos/package/BUILD_INFO.txt
            app/build/macos/package/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 30
