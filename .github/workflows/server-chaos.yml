name: Greenfield server chaos

on:
  schedule:
    - cron: "43 9 * * 3"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: greenfield-server-chaos
  cancel-in-progress: false

jobs:
  distributed-recovery:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/deploy/requirements.lock

      - name: Install chaos client dependencies
        run: python3 -m pip install --require-hashes -r server/deploy/requirements.lock

      - name: Build and start distributed staging stack
        working-directory: server/deploy/staging
        run: docker compose up --build -d --wait --wait-timeout 300

      - name: Establish cross-replica baseline
        working-directory: server/deploy/staging
        run: python3 smoke.py | tee ../../../distributed-smoke.log

      - name: Run bounded dependency and replica failures
        working-directory: server/deploy/staging
        run: python3 chaos.py | tee ../../../distributed-chaos.log

      - name: Capture distributed stack state and logs
        if: always()
        working-directory: server/deploy/staging
        run: |
          docker compose ps -a > ../../../distributed-compose-ps.log 2>&1 || true
          docker compose logs --no-color > ../../../distributed-compose.log 2>&1 || true

      - name: Upload chaos evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: greenfield-server-chaos-${{ github.run_attempt }}
          path: |
            distributed-smoke.log
            distributed-chaos.log
            distributed-compose-ps.log
            distributed-compose.log
          if-no-files-found: warn
          retention-days: 30

      - name: Restore and tear down distributed staging stack
        if: always()
        working-directory: server/deploy/staging
        run: |
          docker unpause kolkhoz-staging-postgres-1 kolkhoz-staging-redis-1 >/dev/null 2>&1 || true
          docker rm -f kolkhoz-staging-chaos-takeover >/dev/null 2>&1 || true
          docker compose down -v --remove-orphans --timeout 30
